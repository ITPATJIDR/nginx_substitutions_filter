server {
    listen 80;
    server_name localhost;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Pass requests to Express app
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP Substitutions Filter - Advanced text replacement
        # Replace "Hello" with "Hi" (case sensitive)
        subs_filter 'Hello' 'Hi' g;
        
        # Replace "Express" with "Nginx-Express" (case sensitive)
        subs_filter 'Express' 'Nginx-Express' g;
        
        # Example regex replacement: replace any number with "X"
        # subs_filter '(\d+)' 'X' r;
        
        # Example case-insensitive replacement
        # subs_filter 'hello' 'hi' gi;
        
        # Enable subs_filter for all content types
        subs_filter_types *;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://app:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
