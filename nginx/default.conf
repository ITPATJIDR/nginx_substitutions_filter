# Load JavaScript module
js_import body_transform from /usr/local/openresty/nginx/conf/body_transform.js;

server {
    listen 80;
    server_name localhost;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Pass requests to Express app with body transformation
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Transform request body before sending to backend
        js_body_filter body_transform.transformRequestBody;
        
        # Transform response body before sending to client
        js_body_filter body_transform.transformResponseBody;
    }

    # Health check endpoint (no transformation needed)
    location /health {
        proxy_pass http://app:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
