# Load Lua script
lua_package_path "/usr/local/openresty/nginx/conf/?.lua;;";

server {
    listen 80;
    server_name localhost;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Pass requests to Express app with body transformation
    location / {
        # Transform request body before sending to backend
        access_by_lua_block {
            local transform = require "body_transform"
            transform.transform_request_body()
        }
        
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Transform response body before sending to client
        body_filter_by_lua_block {
            local transform = require "body_transform"
            transform.transform_response_body()
        }
    }

    # Health check endpoint (no transformation needed)
    location /health {
        proxy_pass http://app:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
