# Load JavaScript module
load_module modules/ngx_http_js_module.so;

# Load JavaScript functions
js_import body_transform from /etc/nginx/body_transform.js;

server {
    listen 80;
    server_name localhost;

    location / {
        js_content body_transform.transformRequestBody;
        
        proxy_set_header Authorization "";
        proxy_set_header X-API-Key "";
        proxy_set_header X-Auth-Token "";
        
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;

        more_clear_headers Authorization;
        more_clear_headers X-API-Key;
        more_clear_headers Server;
        
        js_body_filter body_transform.transformResponseBody;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://app:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}