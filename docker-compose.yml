version: '3.8'

services:
  app:
    build: .
    container_name: express_app
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    build: 
      context: ./nginx
      dockerfile: Dockerfile.simple
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf.simple:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
